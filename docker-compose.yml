version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: livestream_postgres
    environment:
      POSTGRES_DB: livestream_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: livestream_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    container_name: livestream_localstack
    environment:
      SERVICES: s3,ses
      DEFAULT_REGION: ap-northeast-1
      AWS_DEFAULT_REGION: ap-northeast-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  mockservices:
    build:
      context: .
      dockerfile: app/mock/LivestreamApp.MockServices/Dockerfile
    container_name: livestream_mockservices
    ports:
      - "5200:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  api:
    build:
      context: .
      dockerfile: app/backend/LivestreamApp.API/Dockerfile
    container_name: livestream_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=livestream_dev;Username=postgres;Password=postgres"
      Redis__ConnectionString: "redis:6379"
      AWS__ServiceURL: "http://localstack:4566"
      # Agora (Unit 2 — Livestream Engine)
      Agora__AppId: "${AGORA_APP_ID:-}"
      Agora__AppCertificate: "${AGORA_APP_CERTIFICATE:-}"
      Agora__MockMode: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
